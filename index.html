<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Intranet PCESP</title>
    <style>
        /* Estilo para a nova barra de pesquisa */
        #search-input {
            width: calc(100% - 40px);
            margin: 15px 20px;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            font-family: sans-serif;
            outline: none;
        }
        #search-input:focus { border-color: #0f0; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="p-home" class="page">
        <h2 style="text-align:center">ANÚNCIOS OFICIAIS</h2>
        <input type="text" id="search-input" onkeyup="filtrarDados()" placeholder="🔍 Pesquisar nos anúncios...">
        <div id="list-anuncios"></div>
    </div>

    <script>
    // --- CONFIGURAÇÃO E VARIÁVEIS ---
    const db = firebase.database();
    let isAdmin = false;
    let ptn = "Cidadão";
    let activeID = "";
    const WEBHOOK_URL = "SUA_URL_DO_WEBHOOK_AQUI"; // COLOQUE SEU WEBHOOK AQUI

    // --- NOTIFICAÇÕES DISCORD ---
    function enviarAlertaDiscord(id, n, m, tipo = "NOVO_BOLETIM") {
        let mensagem = {};
        
        if(tipo === "NOVO_BOLETIM") {
            mensagem = {
                content: "🚨 **NOVA OCORRÊNCIA REGISTRADA**",
                embeds: [{
                    title: "Protocolo: " + id,
                    color: 15158332,
                    fields: [
                        { name: "Solicitante", value: n, inline: true },
                        { name: "Relato", value: m }
                    ],
                    footer: { text: "Sistema PCESP" }
                }]
            };
        } else if(tipo === "NOVA_MSG") {
            mensagem = {
                content: `📩 **Nova mensagem no Boletim [${id}]**`,
                embeds: [{
                    description: `O Civil enviou: "${m}"\n\n**Vá atendê-lo(a) agora.**`,
                    color: 3447003
                }]
            };
        }

        fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(mensagem)
        }).catch(err => console.error("Erro Discord:", err));
    }

    // --- AUTENTICAÇÃO ---
    function handleAuth() {
        if(prompt("SENHA:") === "KaqFemboy") {
            isAdmin = true; 
            ptn = prompt("PATENTE:");
            document.querySelectorAll('.hidden').forEach(el => el.classList.remove('hidden'));
            document.getElementById('btn-lock').innerText = ptn;
            switchTab('home');
        }
    }

    // --- NAVEGAÇÃO E PESQUISA ---
    function switchTab(t) {
        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('p-' + t).classList.remove('hidden');
        document.querySelectorAll('.tab').forEach(tb => tb.classList.remove('active'));
        
        // Limpa a busca ao trocar de aba
        if(document.getElementById('search-input')) document.getElementById('search-input').value = '';

        // Renderização com exibição de PATENTE [v.p]
        if(t==='home') render('anuncios', 'list-anuncios', (v) => `<b>[${v.d}]</b> 🎖️ <b>${v.p || 'CMD'}:</b> ${v.t}`);
        if(t==='fichas') render('fichas', 'list-fichas', (v) => `<b>${v.n}</b> - ${v.c}`);
        if(t==='transp') render('transparencia', 'list-transp', (v) => `🛡️ ${v.txt}`);
        if(t==='admin') render('boletins', 'admin-list', (v, k) => `<div onclick="openChat('${k}')">📁 <b>${k}</b>: ${v.n}</div>`);
        if(t==='copom') renderCopom();
    }

    // FUNÇÃO DA BARRA DE PESQUISA
    function filtrarDados() {
        const input = document.getElementById('search-input').value.toUpperCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const text = card.innerText || card.textContent;
            card.style.display = text.toUpperCase().includes(input) ? "" : "none";
        });
    }

    // --- RENDERIZADOR ---
    function render(path, elId, template) {
        db.ref(path).on('value', s => {
            const el = document.getElementById(elId); el.innerHTML = '';
            s.forEach(snap => {
                const k = snap.key; const v = snap.val();
                let tools = isAdmin ? `<div class="adm-tools"><button class="btn-tool btn-edit" onclick="editData('${path}','${k}')">✏️</button><button class="btn-tool btn-del" onclick="deleteData('${path}','${k}')">🗑️</button></div>` : '';
                el.innerHTML += `<div class="card">${tools}${template(v, k)}</div>`;
            });
        });
    }

    // --- FUNÇÕES DE INTERAÇÃO ---
    function submitBO() {
        const id = "PC-" + Math.floor(1000 + Math.random() * 9000);
        const n = document.getElementById('bo-n').value;
        const m = document.getElementById('bo-m').value;
        if(!n || !m) return alert("Preencha tudo!");

        db.ref('boletins/' + id).set({ n: n });
        db.ref('chats/' + id).push({ p: 'Cidadão', text: m });
        
        enviarAlertaDiscord(id, n, m, "NOVO_BOLETIM");
        alert("PROTOCOLO: " + id);
        openChat(id);
    }

    function openChat(id) {
        if(!id) return alert("Digite o Protocolo!");
        activeID = id; switchTab('chat');
        document.getElementById('chat-label').innerText = "CASO " + id;
        db.ref('chats/'+id).on('value', s => {
            const a = document.getElementById('chat-msgs'); a.innerHTML = '';
            if(!s.exists()) { a.innerHTML = 'Não encontrado.'; return; }
            s.forEach(x => {
                let tools = isAdmin ? `<button class="btn-tool btn-del" style="float:right" onclick="deleteData('chats/${activeID}','${x.key}')">🗑️</button>` : '';
                a.innerHTML += `<div class="bubble">${tools}<b>${x.val().p}:</b> ${x.val().text}</div>`;
            });
            a.scrollTop = a.scrollHeight;
        });
    }

    function sendMsg() {
        const t = document.getElementById('chat-in').value; if(!t) return;
        const remetente = isAdmin ? ptn : 'Cidadão';
        
        db.ref('chats/'+activeID).push({ p: remetente, text: t });
        
        // Notifica Discord se o civil responder
        if(!isAdmin) {
            enviarAlertaDiscord(activeID, "Cidadão", t, "NOVA_MSG");
        }
        document.getElementById('chat-in').value = '';
    }

    function sendCopom() {
        const t = document.getElementById('copom-in').value; if(!t) return;
        db.ref('copom').push({ p: ptn, t: t });
        document.getElementById('copom-in').value = '';
    }

    function renderCopom() {
        db.ref('copom').on('value', s => {
            const el = document.getElementById('copom-list'); el.innerHTML = '';
            s.forEach(x => {
                let tools = isAdmin ? `<button class="btn-tool btn-del" style="float:right" onclick="deleteData('copom','${x.key}')">🗑️</button>` : '';
                el.innerHTML += `<div class="bubble" style="border-left:3px solid #0f0"><b>[${x.val().p}]</b>: ${x.val().t}${tools}</div>`;
            });
            el.scrollTop = el.scrollHeight;
        });
    }

    // --- CRUD ---
    function deleteData(path, k) { if(confirm("EXCLUIR?")) db.ref(`${path}/${k}`).remove(); }
    
    function editData(path, k) {
        let val = prompt("NOVO TEXTO:");
        if(val) {
            if(path==='fichas') { 
                let c = prompt("CARGO:"); 
                db.ref(`${path}/${k}`).update({n:val, c:c}); 
            } else if(path==='anuncios') {
                db.ref(`${path}/${k}`).update({t:val, p:ptn}); // Salva quem editou
            } else {
                db.ref(`${path}/${k}`).update({txt:val});
            }
        }
    }

    function gerarPDF() { html2pdf().from(document.getElementById('chat-msgs')).save(`PCESP_${activeID}.pdf`); }
    switchTab('home');
</script>
</body>
</html>
