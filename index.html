<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA PCESP | BRASIL LEGACY</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --gold: #ffcc00; --blue: #0a192f; --dark: #02060c;
            --glass: rgba(255, 255, 255, 0.05); --danger: #ff4747; --info: #00d4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: radial-gradient(circle at top, #102a43, var(--dark)); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding-bottom: 90px; }

        /* HEADER COM BRASÃO CORRIGIDO */
        header { 
            background: rgba(0, 0, 0, 0.9); padding: 20px; text-align: center; 
            border-bottom: 2px solid var(--gold); backdrop-filter: blur(10px); 
            position: sticky; top: 0; z-index: 100; 
        }
        
        .logo-pcesp { 
            width: 80px; height: 80px; 
            object-fit: contain;
            filter: drop-shadow(0 0 10px var(--gold)); 
            margin-bottom: 5px;
        }

        .app-container { padding: 15px; max-width: 600px; margin: 0 auto; }
        .card { background: var(--glass); border: 1px solid rgba(255, 215, 0, 0.1); border-radius: 12px; padding: 18px; margin-bottom: 15px; backdrop-filter: blur(10px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        
        h2 { font-size: 0.9rem; color: var(--gold); text-transform: uppercase; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; border-left: 3px solid var(--gold); padding-left: 10px; }

        .news-box { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-right: 3px solid var(--info); transition: 0.3s; }
        .news-box.transparencia { border-right-color: var(--danger); }
        .news-date { font-size: 0.65rem; color: var(--gold); display: block; margin-bottom: 5px; opacity: 0.8; }
        .news-title { font-weight: bold; font-size: 1rem; margin-bottom: 5px; color: #fff; }
        .news-content { font-size: 0.85rem; color: #bdc3c7; line-height: 1.4; }

        input, textarea, select { width: 100%; background: rgba(0,0,0,0.7); border: 1px solid #2c3e50; color: #fff; padding: 14px; border-radius: 8px; margin-bottom: 12px; font-size: 1rem; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .btn-operacional { background: linear-gradient(135deg, #ffcc00, #d4a017); color: #000; border: none; width: 100%; padding: 16px; font-weight: 900; border-radius: 8px; text-transform: uppercase; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; box-shadow: 0 4px 15px rgba(212, 160, 23, 0.3); }
        .btn-operacional:active { transform: scale(0.96); }

        nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0, 0, 0, 0.95); display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--gold); box-shadow: 0 -5px 20px rgba(0,0,0,0.8); }
        .nav-link { color: #555; text-decoration: none; text-align: center; font-size: 0.7rem; flex: 1; transition: 0.3s; }
        .nav-link i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .nav-link.active { color: var(--gold); text-shadow: 0 0 10px rgba(255,204,0,0.5); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <img src="https://logodownload.org/wp-content/uploads/2019/08/policia-civil-sp-logo.png" 
         onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Bras%C3%A3o_da_Pol%C3%ADcia_Civil_do_Estado_de_S%C3%A3o_Paulo.png/600px-Bras%C3%A3o_da_Pol%C3%ADcia_Civil_do_Estado_de_S%C3%A3o_Paulo.png'"
         class="logo-pcesp" alt="Brasão PCESP">
    <div style="color:var(--gold); font-weight:900; letter-spacing:3px; font-size:1rem; margin-top:5px;">PCESP | INTRANET</div>
    <div style="font-size: 0.6rem; color: #888; text-transform: uppercase;">Unidade de Inteligência Brasil Legacy</div>
</header>

<div class="app-container">
    
    <div id="aba-anuncios" class="page-content">
        <div class="card">
            <h2><i class="fas fa-bullhorn"></i> Comunicados Oficiais</h2>
            <div id="lista-anuncios"><p style="text-align:center; padding:20px; color:#666;">Aguardando novas ordens...</p></div>
        </div>
    </div>

    <div id="aba-transparencia" class="page-content hidden">
        <div class="card">
            <h2><i class="fas fa-search"></i> Diário Oficial (Transparência)</h2>
            <div id="lista-transparencia"><p style="text-align:center; padding:20px; color:#666;">Sem movimentações registradas.</p></div>
        </div>
    </div>

    <div id="aba-bo" class="page-content hidden">
        <div class="card">
            <h2><i class="fas fa-shield-alt"></i> Terminal de Ocorrências</h2>
            <select id="tipo-registro">
                <option value="bo">Boletim de Ocorrência (B.O)</option>
                <option value="denuncia">Denúncia Anônima (181)</option>
            </select>
            <input type="text" id="reg-nome" placeholder="Identificação do Agente/Civil">
            <textarea id="reg-texto" rows="6" placeholder="Relato fiel dos acontecimentos..."></textarea>
            <button class="btn-operacional" onclick="enviarRegistro()">Transmitir para o QG</button>
        </div>
    </div>

    <div id="aba-admin" class="page-content hidden">
        <div class="card" style="border-color: var(--info);">
            <h2><i class="fas fa-plus-square"></i> Painel de Comando</h2>
            <select id="post-tipo">
                <option value="anuncio">Publicar em: ANÚNCIOS</option>
                <option value="transparencia">Publicar em: TRANSPARÊNCIA</option>
            </select>
            <input type="text" id="post-titulo" placeholder="Título do Comunicado">
            <textarea id="post-conteudo" rows="4" placeholder="Escreva a notícia ou alteração de cargo..."></textarea>
            <button class="btn-operacional" style="background:var(--info);" onclick="publicarNoticia()">Publicar no Portal</button>
        </div>

        <div class="card">
            <h2><i class="fas fa-calculator"></i> Cálculo de Pena</h2>
            <div id="calc-crimes" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            <textarea id="res-pena" rows="5" readonly style="margin-top:15px; background:#000; border-color:var(--gold); font-family:monospace; color:var(--gold);"></textarea>
            <button class="btn-operacional" onclick="copiarPena()"><i class="fas fa-copy"></i> Copiar Guia de Prisão</button>
        </div>
        <button class="btn-operacional" style="background:#1a1a1a; color:#fff; margin-top:10px;" onclick="sairAdmin()">Encerrar Sessão</button>
    </div>

</div>

<nav>
    <a href="#" class="nav-link active" onclick="navegar('anuncios', this)"><i class="fas fa-newspaper"></i>Avisos</a>
    <a href="#" class="nav-link" onclick="navegar('transparencia', this)"><i class="fas fa-balance-scale"></i>Transparência</a>
    <a href="#" class="nav-link" onclick="navegar('bo', this)"><i class="fas fa-file-contract"></i>Registrar</a>
    <a href="#" class="nav-link" onclick="acessoAdmin()"><i class="fas fa-user-shield"></i>Admin</a>
</nav>

<script>
    const fbConfig = { databaseURL: "https://pcesp-rp-default-rtdb.firebaseio.com/" };
    const webhook = "https://discord.com/api/webhooks/1486511741881024644/_Q5zOKkiypYn_ivTAVS6brkO6IAD0uW9C7CTRA8DMq6nvVyw_rXt-k6Nih9VHs3sjJTi";

    firebase.initializeApp(fbConfig);
    const db = firebase.database();

    function navegar(id, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('aba-' + id).classList.remove('hidden');
        el.classList.add('active');
    }

    function acessoAdmin() {
        if(localStorage.getItem('admin_pcesp') === 'ativo') {
            navegar('admin', document.querySelector('.nav-link:last-child'));
            return;
        }
        const s = prompt("CÓDIGO DE SEGURANÇA:");
        if(s === "KaqFemboy") {
            localStorage.setItem('admin_pcesp', 'ativo');
            navegar('admin', document.querySelector('.nav-link:last-child'));
        } else { alert("ACESSO BLOQUEADO!"); }
    }

    function sairAdmin() { localStorage.removeItem('admin_pcesp'); location.reload(); }

    function carregarPosts() {
        db.ref('posts').on('value', s => {
            const anun = document.getElementById('lista-anuncios');
            const trans = document.getElementById('lista-transparencia');
            anun.innerHTML = ""; trans.innerHTML = "";
            s.forEach(item => {
                const p = item.val();
                const html = `<div class="news-box ${p.tipo === 'transparencia' ? 'transparencia' : ''}">
                    <span class="news-date"><i class="far fa-calendar-alt"></i> ${p.data}</span>
                    <span class="news-title">${p.titulo}</span>
                    <p class="news-content">${p.conteudo}</p>
                </div>`;
                if(p.tipo === 'anuncio') anun.insertAdjacentHTML('afterbegin', html);
                else trans.insertAdjacentHTML('afterbegin', html);
            });
        });
    }

    function publicarNoticia() {
        const tipo = document.getElementById('post-tipo').value;
        const titulo = document.getElementById('post-titulo').value;
        const conteudo = document.getElementById('post-conteudo').value;
        if(!titulo || !conteudo) return alert("Preencha todos os campos.");

        const data = new Date().toLocaleDateString('pt-BR') + " - " + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        db.ref('posts').push({ tipo, titulo, conteudo, data });
        alert("Publicado com sucesso!");
        document.getElementById('post-titulo').value = ""; document.getElementById('post-conteudo').value = "";
    }

    function enviarRegistro() {
        const tipo = document.getElementById('tipo-registro').value;
        const nome = document.getElementById('reg-nome').value || "Não identificado";
        const texto = document.getElementById('reg-texto').value;
        if(!texto) return alert("Descreva a ocorrência.");

        const titulo = tipo === 'bo' ? "🚨 NOVO BOLETIM (PCESP)" : "🕵️ DENÚNCIA 181 (SIGILO)";
        const cor = tipo === 'bo' ? 3447003 : 15105570;

        fetch(webhook, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ embeds: [{ title: titulo, description: `**Relator:** ${nome}\n**Mensagem:** ${texto}`, color: cor, footer: {text:"Intranet PCESP Brasil Legacy"} }] })
        });
        alert("Protocolo transmitido!");
        location.reload();
    }

    const CRIMES = [{n:"Homicídio",p:30},{n:"Tráfico",p:15},{n:"Roubo",p:10},{n:"Arma",p:8},{n:"Desacato",p:5},{n:"Fuga",p:7}];
    const cDiv = document.getElementById('calc-crimes');
    CRIMES.forEach((c, i) => {
        cDiv.innerHTML += `<div style="font-size:0.8rem; background:rgba(255,255,255,0.05); padding:8px; border-radius:5px;"><input type="checkbox" style="width:auto; margin-right:8px;" value="${i}" onchange="calc()"> ${c.n}</div>`;
    });

    function calc() {
        let p = 0; let l = [];
        document.querySelectorAll('#calc-crimes input:checked').forEach(i => { p += CRIMES[i.value].p; l.push(CRIMES[i.value].n); });
        document.getElementById('res-pena').value = `PCESP - GUIA DE RECOLHIMENTO\n--------------------------\nCRIMES: ${l.join(', ')}\nPENA FINAL: ${p} Meses\n--------------------------`;
    }

    function copiarPena() { const t = document.getElementById('res-pena'); t.select(); document.execCommand('copy'); alert("Copiado!"); }

    window.onload = carregarPosts;
</script>

</body>
</html>
