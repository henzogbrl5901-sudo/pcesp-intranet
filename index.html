<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Intranet PCESP</title>
    <style>
        /* Estilos Originais */
        body { background: #111; color: #fff; font-family: sans-serif; }
        #search-input {
            width: calc(100% - 40px);
            margin: 15px 20px;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            outline: none;
        }
        #search-input:focus { border-color: #0f0; }
        .hidden { display: none; }
        .card { background: #222; padding: 15px; margin: 10px; border-radius: 5px; border-left: 5px solid #444; }
        
        /* --- NOVOS ESTILOS PARA LOGS DE MENSAGENS --- */
        #chat-msgs { height: 300px; overflow-y: auto; padding: 10px; background: #000; border-radius: 5px; }
        .bubble { padding: 10px; margin: 8px 0; border-radius: 5px; position: relative; line-height: 1.4; }
        
        /* Mensagem do Civil */
        .msg-civil { background: #333; border-left: 4px solid #ffcc00; color: #eee; }
        
        /* Mensagem da Polícia (Admin) */
        .msg-pcesp { background: #1a2a4a; border-left: 4px solid #0051ff; color: #fff; }
        
        .btn-tool { cursor: pointer; background: none; border: none; font-size: 1.2em; }
        .active { color: #0f0; font-weight: bold; }
    </style>
</head>
<body>

    <div id="p-home" class="page">
        <h2 style="text-align:center">ANÚNCIOS OFICIAIS</h2>
        <input type="text" id="search-input" onkeyup="filtrarDados()" placeholder="🔍 Pesquisar nos anúncios...">
        <div id="list-anuncios"></div>
    </div>

    <!-- Interface de Chat (Log de B.O) -->
    <div id="p-chat" class="page hidden">
        <h2 id="chat-label">CASO</h2>
        <div id="chat-msgs"></div>
        <div style="margin-top:10px">
            <input type="text" id="chat-in" placeholder="Digite sua resposta...">
            <button onclick="sendMsg()">ENVIAR</button>
            <button onclick="gerarPDF()">PDF</button>
            <button onclick="switchTab('home')">VOLTAR</button>
        </div>
    </div>

    <script>
    // --- CONFIGURAÇÃO E VARIÁVEIS ---
    const db = firebase.database();
    let isAdmin = false;
    let ptn = "Cidadão";
    let activeID = "";
    const WEBHOOK_URL = "SUA_URL_DO_WEBHOOK_AQUI"; 

    // --- NOTIFICAÇÕES DISCORD (Mantido Original) ---
    function enviarAlertaDiscord(id, n, m, tipo = "NOVO_BOLETIM") {
        let mensagem = {};
        if(tipo === "NOVO_BOLETIM") {
            mensagem = {
                content: "🚨 **NOVA OCORRÊNCIA REGISTRADA**",
                embeds: [{
                    title: "Protocolo: " + id,
                    color: 15158332,
                    fields: [
                        { name: "Solicitante", value: n, inline: true },
                        { name: "Relato", value: m }
                    ],
                    footer: { text: "Sistema PCESP" }
                }]
            };
        } else if(tipo === "NOVA_MSG") {
            mensagem = {
                content: `📩 **Nova mensagem no Boletim [${id}]**`,
                embeds: [{
                    description: `O Civil enviou: "${m}"\n\n**Vá atendê-lo(a) agora.**`,
                    color: 3447003
                }]
            };
        }
        fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(mensagem)
        }).catch(err => console.error("Erro Discord:", err));
    }

    // --- AUTENTICAÇÃO ---
    function handleAuth() {
        if(prompt("SENHA:") === "KaqFemboy") {
            isAdmin = true; 
            ptn = prompt("PATENTE:");
            document.querySelectorAll('.hidden').forEach(el => el.classList.remove('hidden'));
            switchTab('home');
        }
    }

    // --- NAVEGAÇÃO E PESQUISA ---
    function switchTab(t) {
        // Se sair do chat, desliga o ouvinte para economizar dados e evitar bugs
        if(activeID && t !== 'chat') {
            db.ref('chats/' + activeID).off();
        }

        document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
        document.getElementById('p-' + t).classList.remove('hidden');
        if(document.getElementById('search-input')) document.getElementById('search-input').value = '';

        if(t==='home') render('anuncios', 'list-anuncios', (v) => `<b>[${v.d}]</b> 🎖️ <b>${v.p || 'CMD'}:</b> ${v.t}`);
        if(t==='fichas') render('fichas', 'list-fichas', (v) => `<b>${v.n}</b> - ${v.c}`);
    }

    function filtrarDados() {
        const input = document.getElementById('search-input').value.toUpperCase();
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            const text = card.innerText || card.textContent;
            card.style.display = text.toUpperCase().includes(input) ? "" : "none";
        });
    }

    // --- RENDERIZADOR BASE ---
    function render(path, elId, template) {
        db.ref(path).on('value', s => {
            const el = document.getElementById(elId); if(!el) return;
            el.innerHTML = '';
            s.forEach(snap => {
                const k = snap.key; const v = snap.val();
                let tools = isAdmin ? `<div class="adm-tools" style="float:right"><button class="btn-tool" onclick="editData('${path}','${k}')">✏️</button><button class="btn-tool" onclick="deleteData('${path}','${k}')">🗑️</button></div>` : '';
                el.innerHTML += `<div class="card">${tools}${template(v, k)}</div>`;
            });
        });
    }

    // --- LOGS DE MENSAGENS (BOLETIM DE OCORRÊNCIA) ---
    function openChat(id) {
        if(!id) return alert("Digite o Protocolo!");
        
        // Limpeza de listener anterior para evitar duplicação de logs
        if(activeID) db.ref('chats/' + activeID).off();
        
        activeID = id; 
        switchTab('chat');
        document.getElementById('chat-label').innerText = "PROTOCOLO: " + id;

        // Inicia o log em tempo real
        db.ref('chats/'+id).on('value', s => {
            const a = document.getElementById('chat-msgs'); 
            a.innerHTML = '';
            
            if(!s.exists()) { a.innerHTML = '<div class="bubble">Aguardando dados...</div>'; return; }
            
            s.forEach(x => {
                const msg = x.val();
                // Define a classe CSS baseada em quem enviou
                const classeTipo = (msg.p === 'Cidadão') ? 'msg-civil' : 'msg-pcesp';
                let tools = isAdmin ? `<button class="btn-tool" style="float:right" onclick="deleteData('chats/${activeID}','${x.key}')">🗑️</button>` : '';
                
                a.innerHTML += `
                    <div class="bubble ${classeTipo}">
                        ${tools}
                        <small style="opacity:0.7; display:block; font-size:0.7em">${msg.p}</small>
                        <b>${msg.text}</b>
                    </div>`;
            });
            a.scrollTop = a.scrollHeight;
        });
    }

    function sendMsg() {
        const input = document.getElementById('chat-in');
        const t = input.value; if(!t) return;
        const remetente = isAdmin ? ptn : 'Cidadão';
        
        db.ref('chats/'+activeID).push({ p: remetente, text: t });
        
        if(!isAdmin) {
            enviarAlertaDiscord(activeID, "Cidadão", t, "NOVA_MSG");
        }
        input.value = '';
    }

    // --- OUTRAS FUNÇÕES ---
    function submitBO() {
        const id = "PC-" + Math.floor(1000 + Math.random() * 9000);
        const n = document.getElementById('bo-n').value;
        const m = document.getElementById('bo-m').value;
        if(!n || !m) return alert("Preencha tudo!");
        db.ref('boletins/' + id).set({ n: n });
        db.ref('chats/' + id).push({ p: 'Cidadão', text: m });
        enviarAlertaDiscord(id, n, m, "NOVO_BOLETIM");
        alert("PROTOCOLO GERADO: " + id);
        openChat(id);
    }

    function deleteData(path, k) { if(confirm("EXCLUIR?")) db.ref(`${path}/${k}`).remove(); }
    function gerarPDF() { html2pdf().from(document.getElementById('chat-msgs')).save(`PCESP_${activeID}.pdf`); }
    
    switchTab('home');
</script>
</body>
</html>
