<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INTRANET | PCESP</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pcesp-gold: #ffcc00;
            --pcesp-dark: #02060c;
            --glass: rgba(255, 255, 255, 0.05);
            --danger: #ff4747;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            background: #02060c;
            background: radial-gradient(circle at top, #102a43, var(--pcesp-dark));
            color: #e6f1ff; 
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--pcesp-gold);
        }

        .header-title { 
            font-size: 1.2rem; 
            font-weight: 800; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            color: var(--pcesp-gold);
        }

        .app-container { padding: 15px; max-width: 600px; margin: 0 auto; }

        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        h2 { 
            font-size: 0.85rem; 
            color: var(--pcesp-gold); 
            text-transform: uppercase; 
            margin-bottom: 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }

        input, textarea, select {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid #1a2233;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .btn-operacional {
            background: linear-gradient(135deg, #ffcc00, #ff9900);
            color: #000;
            border: none;
            width: 100%;
            padding: 18px;
            font-weight: 900;
            border-radius: 8px;
            text-transform: uppercase;
            cursor: pointer;
        }

        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: #000;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid var(--pcesp-gold);
            z-index: 1000;
        }

        .nav-link {
            color: #4b5d67;
            text-decoration: none;
            text-align: center;
            font-size: 0.6rem;
            flex: 1;
        }

        .nav-link i { font-size: 1.3rem; display: block; margin-bottom: 3px; }
        .nav-link.active { color: var(--pcesp-gold); }

        .post-item {
            background: rgba(255,255,255,0.03);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 3px solid var(--pcesp-gold);
        }
        .post-meta { font-size: 0.65rem; color: var(--pcesp-gold); margin-bottom: 4px; }
        .post-content { font-size: 0.85rem; color: #ccc; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header>
    <div class="header-title">PCESP | OPERACIONAL</div>
</header>

<div class="app-container">
    
    <!-- ABA: ANÚNCIOS -->
    <div id="aba-home" class="page-content">
        <div class="card">
            <h2><i class="fas fa-bullhorn"></i> Ordens do Dia</h2>
            <div id="feed-anuncios"></div>
        </div>
    </div>

    <!-- ABA: TRANSPARÊNCIA -->
    <div id="aba-transparencia" class="page-content hidden">
        <div class="card">
            <h2><i class="fas fa-file-invoice"></i> Diário Oficial</h2>
            <div id="feed-transparencia"></div>
        </div>
    </div>

    <!-- ABA: B.O -->
    <div id="aba-bo" class="page-content hidden">
        <div class="card">
            <h2><i class="fas fa-edit"></i> Boletim de Ocorrência</h2>
            <input type="text" id="bo-nome" placeholder="Nome do Envolvido">
            <textarea id="bo-relato" rows="5" placeholder="Relato dos fatos..."></textarea>
            <button class="btn-operacional" onclick="enviarBO()">Protocolar</button>
        </div>
    </div>

    <!-- ABA: DENÚNCIA -->
    <div id="aba-denuncia" class="page-content hidden">
        <div class="card">
            <h2 style="color: #ff4747;"><i class="fas fa-user-secret"></i> DENÚNCIA ANÔNIMA (181)</h2>
            <p style="font-size: 0.7rem; color: #888; margin-bottom: 10px;">O sigilo é absoluto. Suas informações serão enviadas diretamente à inteligência.</p>
            <input type="text" id="den-local" placeholder="Local do Ocorrido">
            <textarea id="den-relato" rows="5" placeholder="Descreva suspeitos, veículos ou crimes..."></textarea>
            <button class="btn-operacional" style="background: #ff4747; color: #fff;" onclick="enviarDenuncia()">Enviar Anonimamente</button>
        </div>
    </div>

    <!-- ABA: RESTRITO (ADMIN) -->
    <div id="aba-restrito" class="page-content hidden">
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Nova Publicação</h2>
            <select id="post-tipo">
                <option value="anuncio">Anúncio</option>
                <option value="transparencia">Transparência</option>
            </select>
            <input type="text" id="post-autor" placeholder="Seu Nome/Cargo">
            <textarea id="post-texto" rows="3" placeholder="Mensagem..."></textarea>
            <button class="btn-operacional" onclick="salvarPost()">Publicar</button>
        </div>

        <div class="card">
            <h2><i class="fas fa-calculator"></i> Calculadora</h2>
            <div id="calc-container"></div>
            <textarea id="txt-calculado" rows="4" readonly style="background:#000; color:var(--pcesp-gold); font-family:monospace; margin-top:10px;"></textarea>
            <button class="btn-operacional" onclick="copiarPena()">Copiar Relatório</button>
        </div>
    </div>
</div>

<nav>
    <a href="#" class="nav-link active" onclick="navegar('home', this)"><i class="fas fa-newspaper"></i>Avisos</a>
    <a href="#" class="nav-link" onclick="navegar('transparencia', this)"><i class="fas fa-search"></i>Transparência</a>
    <a href="#" class="nav-link" onclick="navegar('bo', this)"><i class="fas fa-pen-fancy"></i>B.O.</a>
    <a href="#" class="nav-link" onclick="navegar('denuncia', this)"><i class="fas fa-mask"></i>Denúncia</a>
    <a href="#" class="nav-link" onclick="acessoRestrito()"><i class="fas fa-lock"></i>Admin</a>
</nav>

<script>
    const fbConfig = { databaseURL: "https://pcesp-rp-default-rtdb.firebaseio.com/" };
    const webhookURL = "https://discord.com/api/webhooks/1486511741881024644/_Q5zOKkiypYn_ivTAVS6brkO6IAD0uW9C7CTRA8DMq6nvVyw_rXt-k6Nih9VHs3sjJTi";

    firebase.initializeApp(fbConfig);
    const db = firebase.database();

    const CRIMES = [{n:"Homicídio",p:30},{n:"Tráfico",p:15},{n:"Roubo",p:10},{n:"Arma",p:8},{n:"Desacato",p:5},{n:"Fuga",p:7}];
    const cDiv = document.getElementById('calc-container');
    CRIMES.forEach((c, i) => {
        cDiv.innerHTML += `<label style="display:flex; gap:10px; margin-bottom:8px;"><input type="checkbox" value="${i}" onchange="calc()"> ${c.n} (${c.p}m)</label>`;
    });

    function navegar(aba, el) {
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById('aba-' + aba).classList.remove('hidden');
        if(el) el.classList.add('active');
    }

    function acessoRestrito() {
        if(prompt("SENHA:") === "KaqFemboy") navegar('restrito', document.querySelector('.nav-link:last-child'));
    }

    function salvarPost() {
        const tipo = document.getElementById('post-tipo').value;
        const autor = document.getElementById('post-autor').value;
        const texto = document.getElementById('post-texto').value;
        if(!autor || !texto) return;
        db.ref('postagens').push({ tipo, autor, texto, data: new Date().toLocaleString('pt-BR') });
        alert("Publicado!");
    }

    db.ref('postagens').on('value', snap => {
        const fA = document.getElementById('feed-anuncios'); const fT = document.getElementById('feed-transparencia');
        fA.innerHTML = ""; fT.innerHTML = "";
        snap.forEach(i => {
            const v = i.val();
            const h = `<div class="post-item"><div class="post-meta">${v.data} | ${v.autor}</div><div class="post-content">${v.texto}</div></div>`;
            if(v.tipo === 'anuncio') fA.insertAdjacentHTML('afterbegin', h); else fT.insertAdjacentHTML('afterbegin', h);
        });
    });

    function enviarBO() {
        const n = document.getElementById('bo-nome').value; const r = document.getElementById('bo-relato').value;
        enviarDiscord("🚨 NOVO B.O.", `**Nome:** ${n}\n**Relato:** ${r}`, 3447003);
        alert("Enviado!");
    }

    function enviarDenuncia() {
        const l = document.getElementById('den-local').value; const r = document.getElementById('den-relato').value;
        enviarDiscord("🕵️ DENÚNCIA 181", `**Local:** ${l}\n**Relato:** ${r}`, 15105570);
        alert("Informação enviada!");
    }

    function calc() {
        let pt = 0; let sl = [];
        document.querySelectorAll('#calc-container input:checked').forEach(i => { pt += CRIMES[i.value].p; sl.push(CRIMES[i.value].n); });
        document.getElementById('txt-calculado').value = `PCESP\nCRIMES: ${sl.join(', ')}\nPENA: ${pt} meses`;
    }

    function copiarPena() { const t = document.getElementById('txt-calculado'); t.select(); document.execCommand('copy'); }

    async function enviarDiscord(t, m, c) {
        await fetch(webhookURL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ embeds: [{ title: t, description: m, color: c }] }) });
    }
</script>

</body>
</html>
